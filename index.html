<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMER SIM DATABASE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#0ea5e9 0%,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 25%),
    #020617;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    padding:20px;
    color:white;
}

/* Animated Background */

body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#38bdf8;
    filter:blur(180px);
    opacity:0.15;
    top:-150px;
    left:-150px;
    animation:move1 8s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#7c3aed;
    filter:blur(180px);
    opacity:0.15;
    bottom:-150px;
    right:-150px;
    animation:move2 8s infinite alternate;
}

@keyframes move1{
    from{transform:translate(0,0);}
    to{transform:translate(60px,40px);}
}

@keyframes move2{
    from{transform:translate(0,0);}
    to{transform:translate(-60px,-40px);}
}

/* Main Card */

.container{
    position:relative;
    width:100%;
    max-width:700px;
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    border-radius:30px;
    padding:35px;
    box-shadow:
    0 0 50px rgba(0,0,0,0.5),
    inset 0 0 30px rgba(255,255,255,0.02);
    z-index:10;
}

/* Header */

.logo{
    width:90px;
    height:90px;
    margin:auto;
    margin-bottom:15px;
    border-radius:50%;
    background:linear-gradient(135deg,#38bdf8,#7c3aed);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    font-weight:700;
    box-shadow:0 0 30px rgba(56,189,248,0.5);
}

h1{
    text-align:center;
    font-size:38px;
    font-weight:700;
    background:linear-gradient(to right,#38bdf8,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.tagline{
    text-align:center;
    margin-top:8px;
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:30px;
}

/* Search Area */

.search-area{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#0f172a;
    color:white;
    font-size:16px;
    outline:none;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
}

input:focus{
    border:1px solid #38bdf8;
    box-shadow:0 0 15px rgba(56,189,248,0.3);
}

.search-btn{
    padding:16px 25px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#38bdf8,#7c3aed);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.search-btn:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 10px 25px rgba(56,189,248,0.3);
}

/* Features */

.features{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:25px;
}

.feature{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    padding:15px;
    border-radius:18px;
    text-align:center;
    transition:0.3s;
}

.feature:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,0.05);
}

.feature h3{
    font-size:15px;
    margin-top:8px;
}

.feature p{
    font-size:12px;
    color:#94a3b8;
    margin-top:5px;
}

/* Buttons */

.actions{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.action-btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.action-btn:hover{
    background:#1e293b;
}

/* Status */

.status{
    text-align:center;
    margin-bottom:15px;
    color:#22c55e;
    font-size:14px;
}

/* Result Box */

.result-box{
    background:#020617;
    border-radius:20px;
    padding:20px;
    min-height:220px;
    overflow:auto;
    border:1px solid rgba(255,255,255,0.05);
}

pre{
    color:#22c55e;
    white-space:pre-wrap;
    word-wrap:break-word;
    font-size:14px;
}

/* Scrollbar */

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#38bdf8;
    border-radius:20px;
}

/* Footer */

.footer{
    text-align:center;
    margin-top:25px;
    color:#64748b;
    font-size:13px;
}

/* Mobile */

@media(max-width:768px){

    .features{
        grid-template-columns:1fr;
    }

    .search-area{
        flex-direction:column;
    }

    .actions{
        flex-direction:column;
    }

    h1{
        font-size:28px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
U
</div>

<h1>UMER SIM DATABASE</h1>

<div class="tagline">
FAST • SECURE • PREMIUM DATABASE SEARCH SYSTEM
</div>

<div class="features">

<div class="feature">
<h3>⚡ Live Search</h3>
<p>Real-time API results</p>
</div>

<div class="feature">
<h3>🛡 Secure</h3>
<p>Protected search system</p>
</div>

<div class="feature">
<h3>📱 Responsive</h3>
<p>Works on all devices</p>
</div>

</div>

<div class="search-area">

<input type="text" id="number" placeholder="Enter Number">

<button class="search-btn" onclick="searchSIM()">
Search
</button>

</div>

<div class="actions">

<button class="action-btn" onclick="copyResult()">
Copy
</button>

<button class="action-btn" onclick="downloadResult()">
Download
</button>

<button class="action-btn" onclick="clearResult()">
Clear
</button>

</div>

<div class="status" id="status">
System Ready
</div>

<div class="result-box">

<pre id="output">
Search result will appear here...
</pre>

</div>

<div class="footer">
© 2026 UMER SIM DATABASE
</div>

</div>

<script>

async function searchSIM(){

    const number =
    document.getElementById("number").value;

    const output =
    document.getElementById("output");

    const status =
    document.getElementById("status");

    if(number === ""){

        output.innerText =
        "Please enter a number";

        return;
    }

    output.innerText = "Loading...";
    status.innerText = "Searching Database...";

    try{

        const response =
        await fetch(
        `https://sim-info-api.wasif-ali.workers.dev/?search=${number}`
        );

        const data =
        await response.json();

        output.innerText =
        JSON.stringify(data,null,2);

        status.innerText =
        "Search Completed Successfully";

    }

    catch(error){

        output.innerText =
        "Error Fetching Data";

        status.innerText =
        "Server Error";

        console.log(error);

    }

}

function copyResult(){

    const text =
    document.getElementById("output").innerText;

    navigator.clipboard.writeText(text);

    alert("Result Copied");

}

function clearResult(){

    document.getElementById("output").innerText =
    "Search result will appear here...";

    document.getElementById("status").innerText =
    "System Ready";

}

function downloadResult(){

    const text =
    document.getElementById("output").innerText;

    const blob =
    new Blob([text],{type:"text/plain"});

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "umer-sim-result.txt";

    a.click();

}

</script>

</body>
</html>
